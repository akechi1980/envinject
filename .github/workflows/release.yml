# 在推送 v* 标签时自动构建多平台二进制并发布到 GitHub Release
# 使用方式: git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: envinject-linux-x86_64
            binary_name: envinject
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: envinject-windows-x86_64
            binary_name: envinject.exe
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: envinject-macos-aarch64
            binary_name: envinject
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: envinject-macos-x86_64
            binary_name: envinject

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build (Linux / Windows)
        if: matrix.os != 'macos-14'
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Build macOS aarch64
        if: matrix.os == 'macos-14' && matrix.target == 'aarch64-apple-darwin'
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build macOS x86_64
        if: matrix.os == 'macos-14' && matrix.target == 'x86_64-apple-darwin'
        run: cargo build --release --target x86_64-apple-darwin

      - name: Copy macOS aarch64 artifact
        if: matrix.os == 'macos-14' && matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p artifact
          cp target/aarch64-apple-darwin/release/envinject artifact/

      - name: Copy macOS x86_64 artifact
        if: matrix.os == 'macos-14' && matrix.target == 'x86_64-apple-darwin'
        run: |
          mkdir -p artifact
          cp target/x86_64-apple-darwin/release/envinject artifact/

      - name: Copy Linux artifact
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} artifact/

      - name: Copy Windows artifact
        if: matrix.os == 'windows-latest'
        run: |
          mkdir artifact
          copy target\${{ matrix.target }}\release\${{ matrix.binary_name }} artifact\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets (unique filenames)
        run: |
          # download-artifact 可能把目录内容放在 artifact 名目录下，或再套一层 artifact/，这里兼容两种结构
          copy_bin() { name=$1; bin=$2; dest=$3
            if [ -f "artifacts/$name/$bin" ]; then
              cp "artifacts/$name/$bin" "$dest"
            elif [ -f "artifacts/$name/artifact/$bin" ]; then
              cp "artifacts/$name/artifact/$bin" "$dest"
            else
              echo "::error::找不到 $name 的构建产物，当前目录结构:"
              find artifacts -type f
              exit 1
            fi
          }
          copy_bin envinject-linux-x86_64    envinject        ./envinject-linux-x86_64
          copy_bin envinject-windows-x86_64 envinject.exe    ./envinject-windows-x86_64.exe
          copy_bin envinject-macos-aarch64   envinject        ./envinject-macos-aarch64
          copy_bin envinject-macos-x86_64    envinject        ./envinject-macos-x86_64
          chmod +x envinject-linux-x86_64 envinject-macos-aarch64 envinject-macos-x86_64
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            envinject-linux-x86_64
            envinject-windows-x86_64.exe
            envinject-macos-aarch64
            envinject-macos-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
